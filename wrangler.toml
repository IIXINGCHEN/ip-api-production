# IP Geolocation API - Production Configuration
name = "ip-api-production"
main = "src/app.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "828c75986bc175a04450b061a711e645"

# Default settings
workers_dev = true
minify = true

# Default environment variables (non-sensitive)
[vars]
ENVIRONMENT = "development"
WORKER_ENV = "development"
NODE_ENV = "development"
APP_NAME = "ip-api-production"
APP_VERSION = "2.0.0"
CACHE_SALT = "ip-api-cache-salt"
AUTH_MAX_ENTRIES = "10000"
RATE_LIMIT_MAX_ENTRIES = "10000"
GEO_RESULT_TTL_MS = "300000"
GEO_RESULT_MAX_SIZE = "1000"
GEO_BATCH_MAX_SIZE = "10"
GEO_BATCH_WAIT_MS = "50"
GEO_PROVIDER_TIMEOUT_MS = "5000"
GEO_PRIMARY_THRESHOLD = "50"

# Production environment configuration
[env.production]
name = "ip-api-production"
workers_dev = false
minify = true
routes = [
  { pattern = "ip.hoolhub.top", custom_domain = true }
]

[env.production.vars]
ENVIRONMENT = "production"
WORKER_ENV = "production"
NODE_ENV = "production"
API_BASE_URL = "https://ip.hoolhub.top"

# Staging environment configuration
[env.staging]
name = "ip-api-production"
workers_dev = true
minify = false

[env.staging.vars]
ENVIRONMENT = "staging"
WORKER_ENV = "staging"
NODE_ENV = "staging"

# Development environment configuration
[env.development]
name = "ip-api-dev"
workers_dev = true
minify = false

[env.development.vars]
ENVIRONMENT = "development"
WORKER_ENV = "development"
NODE_ENV = "development"

# Security: Sensitive environment variables should be set via:
# wrangler secret put IPINFO_TOKEN --env production
# wrangler secret put MAXMIND_USER_ID --env production
# wrangler secret put MAXMIND_LICENSE_KEY --env production
# wrangler secret put API_KEY_ADMIN --env production
# wrangler secret put API_KEY_USER --env production
